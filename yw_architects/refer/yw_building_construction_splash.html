
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body, html { background: #F9FBEC; }

  .splash {
    width: 100%;
    min-height: 560px;
    background: #F9FBEC;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  }

  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #C8BAA0 0.8px, transparent 0.8px);
    background-size: 24px 24px;
    opacity: 0.25;
  }

  .accent-bar-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(to bottom, transparent, #B8952A 30%, #755B00 70%, transparent);
    animation: barGrow 1s ease 0.3s both;
    transform-origin: top center;
  }

  .accent-bar-right {
    position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(to bottom, transparent, #B8952A 30%, #755B00 70%, transparent);
    animation: barGrow 1s ease 0.5s both;
    transform-origin: top center;
  }

  @keyframes barGrow {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }

  /* SVG building canvas */
  .building-canvas {
    position: relative;
    z-index: 10;
    width: 320px;
    margin-bottom: 8px;
  }

  /* Stroke draw-on animation helper */
  .draw {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Branding below building */
  .brand-area {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 5px;
    color: #1A1D14;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease 3.6s forwards;
  }

  .tagline-row {
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease 3.8s forwards;
  }

  .rule { height: 1px; width: 24px; background: rgba(208,197,176,0.6); }

  .tagline {
    font-size: 9px; font-weight: 600;
    letter-spacing: 3px; color: #7F7664;
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-wrap {
    position: absolute;
    bottom: 36px; left: 60px; right: 60px;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeUp 0.4s ease 4s forwards;
  }

  .progress-track {
    width: 100%; max-width: 180px; height: 2px;
    background: #E2E4D5; border-radius: 999px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(to right, #755B00, #B8952A);
    border-radius: 999px;
    animation: fillBar 3.5s ease 0.5s forwards;
  }

  .progress-label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 2px; color: rgba(127,118,100,0.5);
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fillBar {
    0%   { width: 0%; }
    20%  { width: 15%; }
    40%  { width: 40%; }
    65%  { width: 70%; }
    85%  { width: 88%; }
    100% { width: 100%; }
  }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1px; color: #755B00;
    background: rgba(184,149,42,0.1);
    border: none; padding: 5px 12px;
    border-radius: 999px; cursor: pointer;
    z-index: 30; text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.4s ease 4.2s forwards;
  }

  .replay-btn:hover { background: rgba(184,149,42,0.22); }

  /* SVG line draw-on keyframes */
  @keyframes draw0   { to { stroke-dashoffset: 0; } }

</style>

<script>
function replaySplash() {
  const el = document.getElementById('splash');
  const clone = el.cloneNode(true);
  el.parentNode.replaceChild(clone, el);
  clone.querySelector('.replay-btn').addEventListener('click', replaySplash);
}
</script>
